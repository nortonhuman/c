<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF 在线预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 改用CDN加速的PDF.js，优先加载核心包 -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            touch-action: manipulation;
        }
        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }
        .pdf-page {
            margin-bottom: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 4px;
            background-color: white;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        /* 隐藏预加载的Canvas，避免视觉闪烁 */
        .preload-canvas {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="bg-white shadow-sm z-10 px-4 py-3 flex justify-between items-center sticky top-0">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-file-pdf text-red-500 text-xl"></i>
            <h1 class="text-lg font-bold text-gray-800 truncate max-w-[200px]" id="doc-title">PDF 预览</h1>
        </div>
        <div class="flex space-x-3">
            <button onclick="zoomOut()" class="text-gray-600 hover:text-blue-600 transition">
                <i class="fa-solid fa-magnifying-glass-minus"></i>
            </button>
            <span id="page-info" class="text-sm text-gray-500 self-center">-</span>
            <button onclick="zoomIn()" class="text-gray-600 hover:text-blue-600 transition">
                <i class="fa-solid fa-magnifying-glass-plus"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto relative" id="main-scroll">
        <div id="loading" class="absolute inset-0 flex flex-col justify-center items-center bg-gray-50 z-0">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 text-sm">正在加载文档...</p>
        </div>

        <div id="error-msg" class="hidden absolute inset-0 flex flex-col justify-center items-center bg-gray-50 z-0 p-6 text-center">
            <i class="fa-solid fa-circle-exclamation text-red-500 text-4xl mb-4"></i>
            <p class="text-gray-700 font-medium mb-2">加载失败</p>
            <p class="text-gray-500 text-sm mb-4" id="error-detail"></p>
            <button onclick="location.reload()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
                重试
            </button>
        </div>

        <!-- 主渲染容器 + 预加载容器 -->
        <div class="relative">
            <div id="pdf-container" class="p-2"></div>
            <div id="preload-container" class="preload-canvas"></div>
        </div>
    </main>

    <footer class="bg-white border-t px-4 py-2 flex justify-center items-center space-x-4 z-10">
        <button id="prev-page" class="px-3 py-1 bg-gray-100 rounded hover:bg-gray-200 disabled:opacity-50" disabled>
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <span class="text-sm text-gray-600">
            Page <input type="number" id="page-num" value="1" min="1" class="w-12 text-center border rounded mx-1 py-0.5 text-sm"> 
            / <span id="page-count">--</span>
        </span>
        <button id="next-page" class="px-3 py-1 bg-gray-100 rounded hover:bg-gray-200 disabled:opacity-50" disabled>
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>

    <script>
        // 优化PDF.js配置：禁用注释、图层等非核心功能，提升加载速度
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        const PDF_OPTIONS = {
            disableAnnotationRendering: true, // 禁用注释渲染
            disableLayerRendering: true,      // 禁用图层渲染
            disableFontFace: true,            // 禁用字体加载（提升速度，可能影响字体显示）
            maxImageSize: 1024,               // 限制图片大小
            useSystemFonts: true              // 使用系统字体
        };

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let scale = 1.0;
        const canvasContainer = document.getElementById('pdf-container');
        const preloadContainer = document.getElementById('preload-container');
        let cachedCanvas = null; // 复用Canvas，减少DOM创建开销
        let preloadPages = new Map(); // 预加载页面缓存

        // 获取URL参数
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 初始化
        window.onload = function() {
            const fileUrl = getQueryParam('file');
            if (!fileUrl) {
                showError("未在 URL 中找到 'file' 参数。\n示例: index.html?file=/pdfs/demo.pdf");
                return;
            }

            let finalUrl = fileUrl;
            if (!fileUrl.startsWith('http') && !fileUrl.startsWith('//')) {
                finalUrl = window.location.origin + (fileUrl.startsWith('/') ? '' : '/') + fileUrl;
            }

            loadPDF(finalUrl);
        };

        // 加载PDF：优化配置+异步加载
        function loadPDF(url) {
            document.getElementById('doc-title').innerText = decodeURIComponent(url.split('/').pop()) || 'PDF Document';
            
            // 使用优化配置加载PDF
            pdfjsLib.getDocument({ url, ...PDF_OPTIONS }).promise
                .then(function(pdfDoc_) {
                    pdfDoc = pdfDoc_;
                    document.getElementById('page-count').textContent = pdfDoc.numPages;
                    document.getElementById('loading').classList.add('hidden');
                    
                    // 初始化复用Canvas
                    cachedCanvas = document.createElement('canvas');
                    cachedCanvas.className = 'pdf-page';
                    canvasContainer.appendChild(cachedCanvas);

                    // 初始渲染第一页 + 预加载第二页
                    renderPage(pageNum);
                    preloadAdjacentPages(pageNum);
                    updateButtons();
                })
                .catch(function(error) {
                    console.error('Error loading PDF:', error);
                    showError("无法加载 PDF 文件。请检查文件路径是否正确，以及是否设置了正确的 CORS 头。");
                });
        }

        // 渲染页面：复用Canvas + 缓存缩放比例
        function renderPage(num) {
            if (pageRendering) return;
            pageRendering = true;

            // 优先使用预加载的页面
            if (preloadPages.has(num)) {
                const preloadedCanvas = preloadPages.get(num);
                cachedCanvas.width = preloadedCanvas.width;
                cachedCanvas.height = preloadedCanvas.height;
                cachedCanvas.getContext('2d').drawImage(preloadedCanvas, 0, 0);
                preloadPages.delete(num);
                pageRendering = false;
                updatePageUI(num);
                preloadAdjacentPages(num); // 预加载新的相邻页
                return;
            }

            // 正常渲染流程（复用Canvas）
            pdfDoc.getPage(num).then(function(page) {
                // 缓存容器宽度，避免频繁DOM查询
                const containerWidth = document.getElementById('main-scroll').clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const desiredScale = containerWidth / viewport.width;
                const finalScale = desiredScale * scale;
                const scaledViewport = page.getViewport({ scale: finalScale });

                // 复用Canvas，避免重复创建
                const context = cachedCanvas.getContext('2d');
                cachedCanvas.height = scaledViewport.height;
                cachedCanvas.width = scaledViewport.width;

                // 高优先级渲染（跳过不必要的渲染步骤）
                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                    renderInteractiveForms: false // 禁用表单渲染
                };

                // 使用fastRender模式
                const renderTask = page.render(renderContext);
                renderTask.promise
                    .then(function() {
                        pageRendering = false;
                        updatePageUI(num);
                        // 处理待渲染的页面
                        if (pageNumPending !== null) {
                            const pendingNum = pageNumPending;
                            pageNumPending = null;
                            renderPage(pendingNum);
                        } else {
                            preloadAdjacentPages(num); // 预加载相邻页
                        }
                    })
                    .catch(err => {
                        console.error('渲染失败:', err);
                        pageRendering = false;
                    });
            });
        }

        // 预加载相邻页面（上一页/下一页）
        function preloadAdjacentPages(currentNum) {
            if (!pdfDoc) return;
            // 预加载下一页
            const nextNum = currentNum + 1;
            if (nextNum <= pdfDoc.numPages && !preloadPages.has(nextNum)) {
                preloadPage(nextNum);
            }
            // 预加载上一页
            const prevNum = currentNum - 1;
            if (prevNum >= 1 && !preloadPages.has(prevNum)) {
                preloadPage(prevNum);
            }
        }

        // 预加载指定页面
        function preloadPage(num) {
            const preloadCanvas = document.createElement('canvas');
            preloadCanvas.className = 'preload-canvas';
            preloadContainer.appendChild(preloadCanvas);

            pdfDoc.getPage(num).then(page => {
                const containerWidth = document.getElementById('main-scroll').clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const desiredScale = containerWidth / viewport.width;
                const finalScale = desiredScale * scale;
                const scaledViewport = page.getViewport({ scale: finalScale });

                preloadCanvas.width = scaledViewport.width;
                preloadCanvas.height = scaledViewport.height;
                const context = preloadCanvas.getContext('2d');

                page.render({
                    canvasContext: context,
                    viewport: scaledViewport,
                    renderInteractiveForms: false
                }).promise.then(() => {
                    preloadPages.set(num, preloadCanvas);
                    // 移除超出2页的预加载缓存，避免内存泄漏
                    if (preloadPages.size > 2) {
                        const keys = Array.from(preloadPages.keys());
                        keys.forEach(key => {
                            if (key !== pageNum - 1 && key !== pageNum + 1) {
                                const canvas = preloadPages.get(key);
                                canvas.remove();
                                preloadPages.delete(key);
                            }
                        });
                    }
                });
            });
        }

        // 更新页面UI（抽离重复逻辑）
        function updatePageUI(num) {
            document.getElementById('page-num').value = num;
            document.getElementById('page-info').textContent = `${num}/${pdfDoc.numPages}`;
            updateButtons();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function onNextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        // 优化缩放逻辑：缓存缩放比例，避免重复渲染
        let lastScale = scale;
        function zoomIn() {
            scale += 0.2;
            if (scale !== lastScale) {
                lastScale = scale;
                renderPage(pageNum);
            }
        }

        function zoomOut() {
            if (scale <= 0.4) return;
            scale -= 0.2;
            if (scale !== lastScale) {
                lastScale = scale;
                renderPage(pageNum);
            }
        }

        function updateButtons() {
            document.getElementById('prev-page').disabled = pageNum <= 1;
            document.getElementById('next-page').disabled = pageNum >= pdfDoc.numPages;
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-msg').classList.remove('hidden');
            document.getElementById('error-detail').innerText = msg;
        }

        // 绑定事件
        document.getElementById('prev-page').addEventListener('click', onPrevPage);
        document.getElementById('next-page').addEventListener('click', onNextPage);
        
        document.getElementById('page-num').addEventListener('change', function(e) {
            const val = parseInt(e.target.value);
            if (val >= 1 && val <= pdfDoc.numPages && val !== pageNum) {
                pageNum = val;
                queueRenderPage(pageNum);
            } else {
                e.target.value = pageNum;
            }
        });

        // 优化触摸滑动：增加节流，避免频繁触发
        let touchStartX = 0;
        let touchEndX = 0;
        let isSwiping = false;
        const mainScroll = document.getElementById('main-scroll');
        
        mainScroll.addEventListener('touchstart', e => {
            if (isSwiping) return;
            touchStartX = e.changedTouches.screenX;
        }, {passive: true});
        
        mainScroll.addEventListener('touchend', e => {
            if (isSwiping) return;
            touchEndX = e.changedTouches.screenX;
            isSwiping = true;
            handleSwipe();
            setTimeout(() => { isSwiping = false; }, 300); // 节流300ms
        }, {passive: true});
        
        function handleSwipe() {
            const threshold = 50;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) < threshold) return; // 忽略小幅度滑动
            
            if (diff < -threshold) {
                onNextPage();
            } else if (diff > threshold) {
                onPrevPage();
            }
        }

        // 窗口大小变化时：防抖处理，避免频繁重绘
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (pdfDoc) renderPage(pageNum);
            }, 200);
        });
    </script>
</body>
</html>
